version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillswap_db
    environment:
      POSTGRES_DB: skillswap
      POSTGRES_USER: skillswap_user
      POSTGRES_PASSWORD: changeme
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skillswap_user -d skillswap']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: skillswap_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: skillswap
      DB_USER: skillswap_user
      DB_PASSWORD: changeme
      JWT_SECRET: change_this_in_production
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
